---
name: CI

"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 20
          - 24

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify Linux service restart and persistence
        if: matrix.node == 20
        run: scripts/test-linux-service.sh

      - name: Verify production release archive
        if: matrix.node == 20
        run: scripts/test-release.sh

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  shell:
    name: Shell validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck shfmt

      - name: Validate shell scripts and systemd packaging
        run: |
          for script in start.sh scripts/*.sh; do
            bash -n "$script"
          done
          shellcheck start.sh scripts/*.sh
          shfmt -d start.sh scripts/*.sh
          scripts/test-linux-install.sh
          systemd-analyze verify packaging/systemd/agent-proxy.service
          systemd-analyze security --offline=yes \
            packaging/systemd/agent-proxy.service

  container:
    name: Container build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build server image
        run: docker build --target server --tag agent-proxy-server:ci .

      - name: Build dashboard image
        run: docker build --target dashboard --tag agent-proxy-dashboard:ci .
