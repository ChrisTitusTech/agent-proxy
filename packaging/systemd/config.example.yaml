---
server:
  host: "127.0.0.1"
  port: 8300
  cors:
    origins: []

database:
  path: "/var/lib/agent-proxy/agent-proxy.db"

auth:
  enabled: true
  admin_token: "${ADMIN_TOKEN}"
  initial_keys:
    - name: "default"
      key: "${PROXY_API_KEY}"

# Enable a provider only after its CLI is installed and authenticated for the
# agent-proxy service account.
providers:
  claude:
    enabled: false
    cli_path: "claude"
    default_model: "claude-sonnet-5"
  codex:
    enabled: false
    cli_path: "codex"
    default_model: "gpt-5.6-sol"
    max_concurrent: 1
  agy:
    enabled: false
    cli_path: "agy"
    default_model: "antigravity"
  grok:
    enabled: false
    cli_path: "grok"
    default_model: "grok-4.5"
    max_concurrent: 1

responses:
  retention_ttl_ms: 1800000
  max_entries: 1000
